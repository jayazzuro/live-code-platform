<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Live Code Execution Demo</title>

    <style>
      body {
        font-family: Arial;
        background: #f4f6f8;
        margin: 40px;
      }

      .container {
        max-width: 800px;
        margin: auto;
      }

      h1 {
        text-align: center;
      }

      textarea {
        width: 100%;
        height: 220px;
        font-family: monospace;
        font-size: 14px;
        padding: 10px;
      }

      button {
        margin-top: 10px;
        padding: 10px 18px;
        background: #4caf50;
        color: white;
        border: none;
        cursor: pointer;
      }

      button:hover {
        background: #45a049;
      }

      pre {
        background: #222;
        color: #0f0;
        padding: 15px;
        margin-top: 15px;
        min-height: 80px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Live Code Execution</h1>

      <textarea id="code">
print("Hello World")
</textarea
      >

      <br />

      <button onclick="runCode()">Run Code</button>

      <h3>Output</h3>

      <pre id="output">Waiting for execution...</pre>
    </div>

    <script>
      const API = "https://live-code-platform.onrender.com";

      async function runCode() {
        document.getElementById("output").innerText = "Running...";

        try {
          const session = await fetch(API + "/code-sessions", {
            method: "POST",
          });

          const sessionData = await session.json();

          const sessionId = sessionData.session_id;

          await fetch(API + "/code-sessions/" + sessionId, {
            method: "PATCH",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              language: "python",
              source_code: document.getElementById("code").value,
            }),
          });

          const run = await fetch(
            API + "/code-sessions/" + sessionId + "/run",
            {
              method: "POST",
            }
          );

          const runData = await run.json();

          const executionId = runData.execution_id;

          setTimeout(async () => {
            const result = await fetch(API + "/executions/" + executionId);

            const data = await result.json();

            document.getElementById("output").innerText =
              data.stdout || data.stderr || data.status;
          }, 2000);
        } catch (err) {
          document.getElementById("output").innerText = "Error: " + err.message;
        }
      }
    </script>
  </body>
</html>
