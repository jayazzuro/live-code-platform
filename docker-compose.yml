version: "3.9"

services:
  api-service:
    build: ./api
    container_name: livecode_api
    ports:
      - "8001:8001"
    env_file:
      - ./api/.env
    depends_on:
      livecode-db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: ./api
    container_name: livecode_worker
    command: node src/worker.js
    env_file:
      - ./api/.env
    depends_on:
      - redis
      - livecode-db
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  livecode-db:
    image: ankane/pgvector:latest
    container_name: livecode-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: livecode
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # - ./db-init/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: livecode_redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
